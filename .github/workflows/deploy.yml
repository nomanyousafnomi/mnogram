name: Build and deploy (self-hosted runner)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: mnogramacr6632.azurecr.io
  IMAGE_NAME: mno-gram
  WEBAPP_NAME: mnogram-6632-nomi
  RESOURCE_GROUP: mnogram-rg

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ${IMAGE_NAME}:latest .

      - name: Login to ACR (uses Azure login on this machine)
        run: |
          az acr login -n mnogramacr6632

      - name: Tag + push image
        run: |
          docker tag ${IMAGE_NAME}:latest ${ACR_LOGIN_SERVER}/mnogram:${GITHUB_SHA}
          docker tag ${IMAGE_NAME}:latest ${ACR_LOGIN_SERVER}/mnogram:latest
          docker push ${ACR_LOGIN_SERVER}/mnogram:${GITHUB_SHA}
          docker push ${ACR_LOGIN_SERVER}/mnogram:latest

      - name: Update Web App to new image + restart
        run: |
          az webapp config container set \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${WEBAPP_NAME}" \
            --docker-custom-image-name "${ACR_LOGIN_SERVER}/mnogram:${GITHUB_SHA}" \
            --docker-registry-server-url "https://${ACR_LOGIN_SERVER}"

          az webapp config appsettings set \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${WEBAPP_NAME}" \
            --settings WEBSITES_PORT=8501

          az webapp restart \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${WEBAPP_NAME}"